<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education Details</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 40px;
            background-color: #f9f9f9;
            color: #333;
        }
        h2 {
            color: #2c3e50;
        }
        .image {
            margin-top: 50px;
            height: 200px;
            width: 80%;
            position: relative;
            background-color: #ecf0f1;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }
        .image img {
            height: 100%;
            border-radius: 10px;
        }
        .details {
            padding-left: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .details p {
            margin: 0;
            color: #34495e;
            font-size: 16px;
        }
        .details p span {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h2>Education</h2>

    <div class="image">
        <img src="images\Sri venkateswara university.png" alt="CIET Logo">
        <div class="details">
            <p><span>Master of Computer Applications(MCA)</span></p>
            <p>Sri Venkateswara University, Tirupati</p>
        
           <p>Current Status: MCA Completed (2025)</p>
        </div>
    </div>

    <div class="image">
        <img src="images\Sri venkateswara university.png" alt="PSR College Logo">
        <div class="details">
           <p><span>Bachelor’s Degree (B.Sc)</span></p>
           <p>Sri Venkateswara University, Tirupati, Andhra Pradesh</p>
           <p>CGPA: 7.9 / 10</p>
           <p>Year of Completion: 2023</p>
        </div>
    </div>
</body>
</html>
